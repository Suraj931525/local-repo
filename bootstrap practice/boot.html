<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- ✅ Bootstrap CSS (FIXED) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">

    <!-- ✅ Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

</head>
<body>

<!-- ✅ Carousel -->
<section id="myCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="2000">
    
    <div class="carousel-inner">

        <div class="carousel-item active">
            <img src="./images.jpg" class="d-block w-100" style="height: 400px; object-fit: cover;">
            <div class="carousel-caption">
                <h1>Hello</h1>
                <p>Coming soon</p>
            </div>
        </div>

        <div class="carousel-item">
            <img src="./download22.jpg" class="d-block w-100" style="height: 400px; object-fit: cover;">
        </div>

        <div class="carousel-item">
            <img src="./image7.webp" class="d-block w-100" style="height: 400px; object-fit: cover;">
        </div>

        <div class="carousel-item">
            <img src="./image4.webp" class="d-block w-100" style="height: 400px; object-fit: cover;">
        </div>

    </div>

    <!-- Controls -->
    <button class="carousel-control-prev" type="button" data-bs-target="#myCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#myCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>

</section>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-dark" style="position: sticky; top:0;">
<article class="container-fluid">
<a href="" class="text-white me-3">Home</a>
<a href="" class="text-white me-3">About</a>
<a href="" class="text-white me-3">Gallery</a>
<a href="" class="text-white me-3">Menu</a>
<a href="" class="text-white">Login</a>
</article>
</nav>

<!-- Alert -->
<div class="alert alert-danger alert-dismissible">
    <b>ITS Harmful To Your Device!!!</b>
    <button class="btn-close" data-bs-dismiss="alert"></button>
</div>

<!-- Buttons -->
<div class="btn-group m-3">
    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-success">Success</button>
    <button class="btn btn-danger">Danger</button>
</div>

<!-- Table -->
<table class="table table-striped table-bordered table-hover m-3">
    <tr class="table-primary">
        <td>1</td><td>2</td><td>3</td>
    </tr>
    <tr class="table-secondary">
        <td>4</td><td>5</td><td>6</td>
    </tr>
</table>

<!-- Form -->
<div class="m-3">
    <label>Name:</label>
    <input type="text" class="form-control">
</div>

<div class="m-3">
    <label>Password:</label>
    <input type="text" class="form-control">
</div>

<button class="btn btn-primary m-3">Submit</button>

<!-- Spinner -->
<div class="m-3">
    <div class="spinner-border text-success"></div>
</div>

<!-- Images -->
<div class="m-3">
    <img src="./images.jpg" class="rounded" height="200">
    <img src="./images.jpg" class="rounded-circle" height="200">
    <img src="./images.jpg" class="img-thumbnail" height="200">
</div>

</body>
</html>
